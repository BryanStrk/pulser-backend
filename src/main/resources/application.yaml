spring:
  application:
    name: pulser-backend

  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:pulser}?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

# --- JWT ---
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}   # 24h en ms

# --- QR firmado (HMAC) ---
qr:
  hmac-secret: ${QR_HMAC_SECRET}

# --- Cloudinary ---
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# --- CORS ---
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# --- Swagger / OpenAPI ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# --- Actuator: solo health, sin detalles ---
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never